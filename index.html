<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cadastro de Alunos</h1>

        <form id = "cadastroForm">
            <input type="text" id="nomeAluno" placeholder="Nome Do Aluno" required>
            <input type="text" id="IdadeAluno" placeholder="Idade Do Aluno" required>
            <input type="text" id="cpfAluno" placeholder="CPF Do Aluno" required>
            <input type="text" id="turmaAluno" placeholder="Turma Do Aluno" required>
            <input type="text" id="contatoAluno" placeholder="Telefone Do Aluno" required>
            <button type= "submit" id="btnSalvar"> Cadastrar </button>

        </form>

    <hr>
    <h2>Lista de Inscritos</h2>
    <ul id="listaAlunos">

    </ul>
    </div>
    <script src="script.js"> </script>
</body>
</html>
